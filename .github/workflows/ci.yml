name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TARGET_DIR: target
  CARGO_TERM_COLOR: always

# Workflow-level least-privilege default. Every job inherits
# `contents: read` unless it explicitly overrides; the
# `excessive-permissions` zizmor audit fails any job missing a
# scoped `permissions:` block. See AGENTS.md "Supply-chain
# hygiene" Rule 8. All 9 jobs in this workflow are read-only;
# no per-job overrides are needed today.
permissions:
  contents: read

# Workflow-level timeout. Per-job 15 min ceiling guards against a wedged
# runner draining minutes overnight; current jobs complete in <2 min so
# this is a generous backstop, not a tight bound.
defaults:
  run:
    shell: bash

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: scrap-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86
          - os: macos-latest
            name: macos-arm
          - os: macos-15-intel
            name: macos-x86
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: scrap-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cargo-nextest@0.9
      # cucumber-rs `harness = false` binaries don't implement libtest's
      # `--list --format terse` interface that nextest uses to enumerate
      # tests, so they fail with exit 2 on enumeration. Mirror the
      # lefthook pre-push split (lefthook.yml): run nextest over
      # everything except the cucumber binary, then run the cucumber
      # binary directly via `cargo test --test cucumber`. Same gates,
      # clean separation. If `nextest` ever grows a per-binary
      # `runs-as-itself` flag, this can collapse back into one command.
      - run: cargo nextest run --workspace --all-targets --locked -E 'not binary(cucumber)'
      - run: cargo test -p scrap-core --test cucumber --locked
      # scrap4rs ships its own cucumber harness for the parser BDD
      # contract (`crates/scrap4rs/tests/features/parser.feature`).
      # Per-crate `-p` is REQUIRED — once both crates ship a
      # `tests/cucumber.rs`, cargo refuses the ambiguous bare
      # `--test cucumber` invocation. (scrap-rs#12 S2.4: this line
      # lands once all parser.feature scenarios are green.)
      - run: cargo test -p scrap4rs --test cucumber --locked

  scrap-examples:
    name: scrap-examples (demo corpus + golden snapshots)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Demo corpus golden-snapshot harness (scrap-rs#80, sub-issue of
    # epic scrap-rs#79). Iterates `crates/scrap-examples/examples/`,
    # invokes scrap-rs programmatically against each fixture's
    # `bad.rs` / `good.rs`, and diffs the emitted JSON envelope
    # against the committed `expected.json`. Drift = behaviour change
    # = CI failure. Bless workflow documented in the sub-crate README.
    #
    # Standalone job (per shape doc D12) rather than folded into the
    # `Test (...)` matrix above — parallel-eligible, clear failure
    # naming in PR status checks, and conflates neither with the
    # standard test suite signal nor with the cross-platform matrix.
    #
    # Branch protection note: this job is informational on the PR
    # that introduces it (scrap-rs#80); it is NOT yet in the required
    # status checks list. Promoting it to required is a separate
    # post-merge orchestrator decision (and PR against branch
    # protection settings, not this workflow file).
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: scrap-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo test -p scrap-examples --locked

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: scrap-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cargo-nextest@0.9
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cargo-llvm-cov@0.6
      # Threshold rationale: domain-only achieves >95% line coverage
      # trivially (constructors + getters covered by serde tests).
      # Setting at 85% is conservative — accommodates the parser-heavy
      # first detector PR (P13) where unreachable error branches
      # legitimately inflate uncovered lines, but catches the agentic-
      # dev failure mode where a future PR adds 200 lines of code and
      # 30 lines of test. Promote to 90% once detector coverage settles.
      #
      # Two-step coverage run (mirrors the test-job split): nextest
      # excluding the cucumber binary (harness = false trips its
      # --list enumeration) accumulates coverage with --no-report,
      # then the cucumber binary is run via `cargo test --test cucumber`
      # also with --no-report, then `report` finalizes the merged lcov.
      # Without this split, nextest fails on cucumber's binary with
      # exit 2 and we lose all coverage.
      - run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --no-report nextest --workspace --locked -E 'not binary(cucumber)'
          cargo llvm-cov --no-report test -p scrap-core --test cucumber --locked
          cargo llvm-cov --no-report test -p scrap4rs --test cucumber --locked
          cargo llvm-cov report --lcov --output-path lcov.info --fail-under-lines 85
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lcov
          path: lcov.info
          retention-days: 7

  msrv:
    name: MSRV (1.93)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @1.93 branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: scrap-rs-msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check --workspace --all-targets --locked

  deny:
    name: cargo-deny (advisories + licenses + bans)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # SHA-pinned: cargo-deny is the supply-chain gate itself, so a
      # tag-poisoning attack on the action would silently disable every
      # other supply-chain check. Tag v2 → 91bf2b6 (verified via
      # `gh api repos/EmbarkStudios/cargo-deny-action/git/ref/tags/v2`).
      - uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1 # v2
        with:
          command: check

  ast-purity:
    name: scrap-core AST-library purity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # The hexagonal layering ADR
    # (`ops/decisions/scrap-rs/adr-hexagonal-layout.md`) bans AST
    # libraries from `scrap-core`'s source. The structural mechanism is
    # `crates/scrap-core/Cargo.toml` itself (a wrong dep would have to
    # be added there to be `use`d), but `serde_derive` already pulls
    # `syn` and `proc-macro2` transitively as proc-macro deps —
    # cargo-deny's transitive-ban mechanism (`bans.deny.wrappers`)
    # would either false-positive on serde_derive's chain or require a
    # fragile, expanding wrapper list. A source-level grep is the right
    # tool: the rule is "no AST-library imports inside
    # crates/scrap-core/src/," and grep enforces exactly that.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Reject AST-library imports in scrap-core
        # Static pattern, no untrusted-input interpolation. Regex notes:
        #   - Matches both `use` and `extern crate` forms.
        #   - Optional `(::)?` handles absolute-path imports (`use ::syn::Foo`).
        #   - Trailing `([_:; ]|$)` is a portable word-boundary substitute
        #     that works on GNU and BSD grep (avoids `\b`/`\w` non-portable
        #     shortcuts). Catches `syn::`, `syn;`, `syn_codegen::`,
        #     `swc_ecma_parser::`, `tree_sitter_typescript::`, etc.;
        #     rejects false positives like `use syntactic_analysis::X`.
        run: |
          set -euo pipefail
          if grep -rE '^[[:space:]]*(use|extern[[:space:]]+crate)[[:space:]]+(::)?(syn|quote|proc_macro2?|tree_sitter|swc|oxc)([_:; ]|$)' crates/scrap-core/src/; then
            echo "::error::scrap-core must not import AST libraries — see decisions/scrap-rs/adr-hexagonal-layout.md"
            exit 1
          fi
          echo "scrap-core is AST-library-pure"

  parser-confinement:
    name: scrap4rs adapter parser-confinement
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # The hexagonal layering ADR
    # (`ops/decisions/scrap-rs/adr-hexagonal-layout.md`) enforces the
    # boundary at the *adapter* level too — `syn` / `quote` /
    # `proc_macro2` belong to the Rust-source parser adapter and must
    # not leak into other modules of `scrap4rs` (CLI surface, future
    # re-exports, etc.). The existing `ast-purity` job keeps these out
    # of `scrap-core`; this job keeps them confined to
    # `crates/scrap4rs/src/parser/` within the adapter crate itself.
    # Preventive structural enforcement before scrap-rs#21 (CLI
    # clap-derive) adds pressure on the adapter boundary.
    #
    # Why grep, not module visibility: `mod parser;` already keeps
    # parser internals private, but nothing prevents a sibling module
    # from re-importing `syn` at top level. The rule is "no AST-library
    # imports outside crates/scrap4rs/src/parser/" — grep enforces
    # exactly that, with the same regex shape as ast-purity for
    # diff-by-eye review.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Reject AST-library imports outside scrap4rs/src/parser/
        # Static pattern, no untrusted-input interpolation. Regex token
        # list (syn|quote|proc_macro2?|tree_sitter|swc|oxc) is byte-
        # identical to ast-purity for symmetric review. Path exclusion
        # is a post-grep `grep -v` on the path prefix (rather than
        # `--exclude-dir=parser`) so it's anchored to
        # `crates/scrap4rs/src/parser/` specifically — a hypothetical
        # future non-AST `parser` subdir under another path would not
        # accidentally inherit the exception. `|| true` keeps `set -e`
        # from tripping when grep finds zero matches (its idiomatic
        # exit-1-on-no-match).
        run: |
          set -euo pipefail
          hits=$(grep -rEn '^[[:space:]]*(use|extern[[:space:]]+crate)[[:space:]]+(::)?(syn|quote|proc_macro2?|tree_sitter|swc|oxc)([_:; ]|$)' crates/scrap4rs/src/ 2>/dev/null | grep -v '^crates/scrap4rs/src/parser/' || true)
          if [ -n "$hits" ]; then
            echo "::error::AST-library imports outside crates/scrap4rs/src/parser/ — see decisions/scrap-rs/adr-hexagonal-layout.md"
            echo "$hits"
            exit 1
          fi
          echo "scrap4rs adapter is parser-confined (syn/quote/proc_macro2/tree_sitter/swc/oxc only inside parser/)"

  adapter-name-purity:
    # NOTE: the `name:` string below is a REQUIRED branch-protection
    # context on `main`. It is INTENTIONALLY kept verbatim across the
    # scrap-rs#37 scope expansion — renaming it would orphan the
    # required context and block all merges (enforce_admins: true).
    # The "(source-only — scrap-rs#18)" suffix is now a historical
    # artifact: as of scrap-rs#37 the gate covers source AND tests.
    name: scrap-core adapter-name literal purity (source-only — scrap-rs#18)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # scrap-core is adapter-name-pure: zero double-quoted "scrap4rs" /
    # "scrap4ts" string literals anywhere in `crates/scrap-core/`
    # (src/ AND tests/). Every adapter-binary name flows through
    # `meta.config_file_name` / `meta.tool_name` supplied by the binary
    # crate, never embedded as a literal in scrap-core. scrap-rs#18
    # established the discipline for src/; scrap-rs#37 EXPANDED the gate
    # to tests/ (incl. tests/cucumber_steps/) by NEUTRALIZING the
    # scrap-core test fixtures to `adapter-a` / `adapter-b` /
    # `test-adapter` rather than exempting them. Real-name emission is
    # verified where identity lives, in `crates/scrap4rs/tests/`.
    #
    # Mirrors the crap-rs precedent (crap-core/.github/workflows/ci.yml,
    # `rg -lF -e '"crap4rs"' -e '"crap4ts"'`, src-only with src/bin/** +
    # #[cfg(test)] exemptions). scrap-rs#37 extends the precedent to
    # tests/ via fixture neutralization, so no test-block exemption is
    # needed.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Reject adapter-name literals in scrap-core source and tests
        # Static pattern, no untrusted-input interpolation. The grep
        # matches any double-quoted string containing the adapter
        # binary name `scrap4rs` or `scrap4ts` as a substring (e.g.
        # `"scrap4rs (snapshot-test fixture)"` or the bare `"scrap4rs"`
        # form). Backtick references (`scrap4rs.toml`) and module-path
        # references (`scrap-rs#37`) don't match — they lack the
        # double-quote delimiters.
        #
        # Comment-strip before matching so doc/prose lines that
        # legitimately mention the adapter name (e.g. a `//!` module
        # docstring quoting `"scrap4rs"`) do NOT false-positive — this
        # is what bit scrap-rs#17 on the src-only gate. The awk filter
        # drops lines whose first non-whitespace is a line-comment
        # (`//`, `///`, `//!`), a block-comment opener (`/*`), or a
        # block-comment continuation (`*`). HEURISTIC, not a parser:
        # a `"scrap4rs"` literal sharing a line with a trailing `//`
        # comment, or buried inside a multi-line string, is not
        # comment-stripped. A syn-based xtask is the v1.0 end-state;
        # pulling syn into this check now would violate scrap-core's
        # AST-purity, so the heuristic stands until then. Portable
        # across GNU + BSD grep/awk (no GNU-only flags).
        run: |
          set -euo pipefail
          matches=$(grep -rnE '"(scrap4rs|scrap4ts)[^"]*"' \
            crates/scrap-core/src crates/scrap-core/tests \
            --include='*.rs' || true)
          # Comment-strip: keep only lines whose content (after the
          # `path:lineno:` prefix, leading whitespace trimmed) is NOT a
          # comment line.
          unmatched=$(printf '%s\n' "$matches" | awk -F: '
            {
              if (NF < 3) next
              content = ""
              for (i = 3; i <= NF; i++) content = content (i > 3 ? ":" : "") $i
              gsub(/^[ \t]+/, "", content)
              if (content !~ /^(\/\/|\/\*|\*)/) print
            }
          ')
          if [ -n "$unmatched" ]; then
            echo "::error::adapter-name literal in scrap-core source/tests — flow the name through AdapterMeta::tool_name (set by the binary crate); neutralize test fixtures to adapter-a/adapter-b/test-adapter (scrap-rs#37)"
            echo "$unmatched"
            exit 1
          fi
          echo "scrap-core is adapter-name-pure (src + tests, comment-stripped)"

  docs:
    name: cargo doc (warnings as errors)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: scrap-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo doc --workspace --no-deps --document-private-items --locked

  zizmor:
    # Mechanical enforcement of the SHA-pin + workflow-security policy.
    # Runs `zizmor` (https://woodruffw.github.io/zizmor/) over every
    # workflow + composite action. The `unpinned-uses` audit is the
    # primary gate — any new floating-tag `uses:` reference (in a
    # workflow OR a composite action) fails CI here. Other zizmor
    # audits (template-injection, excessive-permissions, artipacked,
    # cache-poisoning, etc.) ride along as additional supply-chain
    # hygiene checks at no marginal cost. Dedicated job
    # (parallelizable, fail-fast) rather than chained into ast-purity
    # / cargo-deny so a supply-chain regression surfaces without
    # waiting on the Rust toolchain. zizmor itself is installed via
    # `pipx run` from the public Python registry — no third-party
    # action wrapper to pin (the wrapper itself would just be another
    # `uses:` reference to keep fresh).
    #
    # See AGENTS.md "Supply-chain hygiene" for the convention this
    # job enforces.
    name: zizmor (workflow security audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run zizmor on .github/
        # `pipx run` fetches a pinned-by-PyPI build into a transient
        # venv; the `>=1.5,<2` constraint locks the audit ruleset to
        # the 1.x major so a zizmor release tightening rules doesn't
        # flip CI red between PRs. Bumping the constraint is a manual
        # edit (no Dependabot ecosystem covers this invocation form);
        # the major-version cap means 2.x lands via human-reviewed PR.
        run: pipx run 'zizmor>=1.5,<2' .github/

  scorecard:
    # Symmetric dogfood (scrap-rs#20). scrap-rs's own detectors measure
    # *test* code for smells (V1); crap-rs measures *production* code
    # for complexity (V2). This job runs crap-rs's templated scorecard
    # composite action against scrap-rs's production-code surface — see
    # CLAUDE.md / AGENTS.md "Symmetric dogfood" rule.
    #
    # Composite action pinned by git SHA to the CAPSTONE quick-start
    # commit (`726b805` — "templated example + README quick-start +
    # badge + dogfood smoke", 2026-05-25). Composite actions are
    # consumed as git refs rather than release tarballs — no release
    # workflow needed on the crap-rs side and no `cargo binstall` step
    # needed here. The action handles binary install + LCOV consumption
    # + threshold gate + markdown render + HTML artifact + sticky PR
    # comment in a single `uses:` invocation, mirroring the templated
    # example at `crap-rs/.github/workflows/examples/crap-scorecard.yml`.
    #
    # crap4rs requires a coverage source (CRAP = cognitive complexity ×
    # uncovered-rate), so we regenerate `lcov.info` locally before
    # invoking the action. Two-step recipe (rather than the templated
    # example's one-line `cargo llvm-cov nextest --workspace --lcov`)
    # mirrors the `coverage:` job above — cucumber's `harness = false`
    # binary doesn't implement libtest's `--list --format terse`
    # interface that nextest uses to enumerate tests, so a single-step
    # invocation drops cucumber-exercised coverage. Without the split
    # the BDD-tested branches of `classify_entry`, the parser body
    # walker, etc. show 0% coverage and inflate CRAP scores.
    #
    # `crap4rs.toml` at repo root carries the test-file exclude (the
    # action passes `--config <path>` through to crap4rs; per-invocation
    # `--exclude` flags are not on the action's input surface). The
    # config file is the documented integration point for caller-side
    # excludes — see § Inputs (`config:`) in the action README.
    #
    # Preset values (per orchestrator's prescription, mirroring the
    # composite action README's "Quick start"):
    # - `threshold-preset: default` resolves to cognitive=15 (matches
    #   the prior manual gate's `--threshold 15`).
    # - `run-mode: full` skips delta — no baseline produced; baseline-
    #   management is a future concern when scorecard-aggregate
    #   integration enters the roadmap.
    # - `gate-mode: gate-on-analysis` enforces the threshold (function
    #   above threshold → job fails). Semantic-equivalent to the prior
    #   manual gate's exit-code dependency.
    # - `comment-mode: sticky` posts/updates a PR-level scorecard
    #   comment on every PR run. Requires `pull-requests: write` on
    #   this job (the action emits a no-op-with-warning on fork-PR
    #   token-elevation refusals — see action README § Quick start).
    # - `html-report: true` uploads the per-language HTML report as a
    #   workflow artifact + appends the download link to the sticky
    #   comment. KPI tiles + file cards + dark mode out of the box.
    # - `languages: rust` — single-language single-adapter path. scrap-rs
    #   joins the multi-language path at v0.6+ when `scrap4ts` lands.
    name: scrap4rs CRAP scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # `contents: read` mirrors the workflow-level default; explicit
    # here for the same reason every other job in this file is explicit
    # (zizmor `excessive-permissions` audit clarity). `pull-requests:
    # write` is the additional grant the sticky-comment step needs —
    # this is the ONLY job in the workflow that needs more than read.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: scrap-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cargo-nextest@0.9
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cargo-llvm-cov@0.6
      # Two-step coverage regen mirrors the `coverage:` job — see this
      # job's block-level comment for the cucumber `harness = false`
      # rationale. Same byte-identical recipe across jobs so a future
      # llvm-cov upgrade only touches the two recipe blocks.
      - name: Generate coverage LCOV for crap input
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --no-report nextest --workspace --locked -E 'not binary(cucumber)'
          cargo llvm-cov --no-report test -p scrap-core --test cucumber --locked
          cargo llvm-cov --no-report test -p scrap4rs --test cucumber --locked
          cargo llvm-cov report --lcov --output-path lcov.info
      - uses: breezy-bays-labs/crap-rs/.github/actions/scorecard@726b8050cba87860af221c78516d49ff7f5db5fe # crap-rs CAPSTONE quick-start template
        with:
          coverage: lcov.info
          src: crates/
          config: crap4rs.toml
          threshold-preset: default
          run-mode: full
          gate-mode: gate-on-analysis
          comment-mode: sticky
          html-report: true
          languages: rust

  # cargo-public-api (semver-style public API gate) and cargo-mutants
  # (mutation testing) are deliberately deferred. cargo-public-api lands
  # at v1.0 when semver gating begins; cargo-mutants lands with the
  # first detector PR (P13) when mutating real logic earns its keep.
  # Self-check and scorecard-smoke land as detectors come online
  # (sub-issues P24/P25). They require a non-trivial scrap4rs binary to
  # operate against, so they are deferred from the bootstrap.
