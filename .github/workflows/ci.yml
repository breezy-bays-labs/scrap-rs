name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TARGET_DIR: target
  CARGO_TERM_COLOR: always

# Workflow-level least-privilege default. Every job inherits
# `contents: read` unless it explicitly overrides; the
# `excessive-permissions` zizmor audit fails any job missing a
# scoped `permissions:` block. See AGENTS.md "Supply-chain
# hygiene" Rule 8. All 9 jobs in this workflow are read-only;
# no per-job overrides are needed today.
permissions:
  contents: read

# Workflow-level timeout. Per-job 15 min ceiling guards against a wedged
# runner draining minutes overnight; current jobs complete in <2 min so
# this is a generous backstop, not a tight bound.
defaults:
  run:
    shell: bash

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: scrap-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86
          - os: macos-latest
            name: macos-arm
          - os: macos-15-intel
            name: macos-x86
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: scrap-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cargo-nextest@0.9
      # cucumber-rs `harness = false` binaries don't implement libtest's
      # `--list --format terse` interface that nextest uses to enumerate
      # tests, so they fail with exit 2 on enumeration. Mirror the
      # lefthook pre-push split (lefthook.yml): run nextest over
      # everything except the cucumber binary, then run the cucumber
      # binary directly via `cargo test --test cucumber`. Same gates,
      # clean separation. If `nextest` ever grows a per-binary
      # `runs-as-itself` flag, this can collapse back into one command.
      - run: cargo nextest run --workspace --all-targets --locked -E 'not binary(cucumber)'
      - run: cargo test -p scrap-core --test cucumber --locked
      # scrap4rs ships its own cucumber harness for the parser BDD
      # contract (`crates/scrap4rs/tests/features/parser.feature`).
      # Per-crate `-p` is REQUIRED — once both crates ship a
      # `tests/cucumber.rs`, cargo refuses the ambiguous bare
      # `--test cucumber` invocation. (scrap-rs#12 S2.4: this line
      # lands once all parser.feature scenarios are green.)
      - run: cargo test -p scrap4rs --test cucumber --locked

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: scrap-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cargo-nextest@0.9
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cargo-llvm-cov@0.6
      # Threshold rationale: domain-only achieves >95% line coverage
      # trivially (constructors + getters covered by serde tests).
      # Setting at 85% is conservative — accommodates the parser-heavy
      # first detector PR (P13) where unreachable error branches
      # legitimately inflate uncovered lines, but catches the agentic-
      # dev failure mode where a future PR adds 200 lines of code and
      # 30 lines of test. Promote to 90% once detector coverage settles.
      #
      # Two-step coverage run (mirrors the test-job split): nextest
      # excluding the cucumber binary (harness = false trips its
      # --list enumeration) accumulates coverage with --no-report,
      # then the cucumber binary is run via `cargo test --test cucumber`
      # also with --no-report, then `report` finalizes the merged lcov.
      # Without this split, nextest fails on cucumber's binary with
      # exit 2 and we lose all coverage.
      - run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --no-report nextest --workspace --locked -E 'not binary(cucumber)'
          cargo llvm-cov --no-report test -p scrap-core --test cucumber --locked
          cargo llvm-cov --no-report test -p scrap4rs --test cucumber --locked
          cargo llvm-cov report --lcov --output-path lcov.info --fail-under-lines 85
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lcov
          path: lcov.info
          retention-days: 7

  msrv:
    name: MSRV (1.93)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @1.93 branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: scrap-rs-msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check --workspace --all-targets --locked

  deny:
    name: cargo-deny (advisories + licenses + bans)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      # SHA-pinned: cargo-deny is the supply-chain gate itself, so a
      # tag-poisoning attack on the action would silently disable every
      # other supply-chain check. Tag v2 → 91bf2b6 (verified via
      # `gh api repos/EmbarkStudios/cargo-deny-action/git/ref/tags/v2`).
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2
        with:
          command: check

  ast-purity:
    name: scrap-core AST-library purity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # The hexagonal layering ADR
    # (`ops/decisions/scrap4rs/adr-hexagonal-layout.md`) bans AST
    # libraries from `scrap-core`'s source. The structural mechanism is
    # `crates/scrap-core/Cargo.toml` itself (a wrong dep would have to
    # be added there to be `use`d), but `serde_derive` already pulls
    # `syn` and `proc-macro2` transitively as proc-macro deps —
    # cargo-deny's transitive-ban mechanism (`bans.deny.wrappers`)
    # would either false-positive on serde_derive's chain or require a
    # fragile, expanding wrapper list. A source-level grep is the right
    # tool: the rule is "no AST-library imports inside
    # crates/scrap-core/src/," and grep enforces exactly that.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Reject AST-library imports in scrap-core
        # Static pattern, no untrusted-input interpolation. Regex notes:
        #   - Matches both `use` and `extern crate` forms.
        #   - Optional `(::)?` handles absolute-path imports (`use ::syn::Foo`).
        #   - Trailing `([_:; ]|$)` is a portable word-boundary substitute
        #     that works on GNU and BSD grep (avoids `\b`/`\w` non-portable
        #     shortcuts). Catches `syn::`, `syn;`, `syn_codegen::`,
        #     `swc_ecma_parser::`, `tree_sitter_typescript::`, etc.;
        #     rejects false positives like `use syntactic_analysis::X`.
        run: |
          set -euo pipefail
          if grep -rE '^[[:space:]]*(use|extern[[:space:]]+crate)[[:space:]]+(::)?(syn|quote|proc_macro2?|tree_sitter|swc|oxc)([_:; ]|$)' crates/scrap-core/src/; then
            echo "::error::scrap-core must not import AST libraries — see decisions/scrap4rs/adr-hexagonal-layout.md"
            exit 1
          fi
          echo "scrap-core is AST-library-pure"

  span-purity:
    name: scrap-core Span no-columns purity (v0.1 — tracked scrap-rs#17)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # The Span type is intentionally line-only at v0.1 (no columns).
    # Columns land additively with the SARIF reporter (#17). This grep
    # gate makes the decision structurally un-violable rather than only
    # documented in a Span docstring.
    # tracked: scrap-rs#17 — promote/extend Span to include columns when
    # the SARIF reporter PR lands (per ~/.claude/rules/exclusions.md).
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Reject column fields on Span
        # Static pattern, no untrusted-input interpolation. Targets the
        # Span type's home file directly (not a recursive grep) since
        # the rule is specifically about the v0.1 line-only contract of
        # crate::domain::types::Span. Catches struct fields named
        # start_col / end_col / start_column / end_column and any
        # `column:` field declaration.
        run: |
          set -euo pipefail
          if grep -rE '\b(start_col|end_col|start_column|end_column|column:)\b' crates/scrap-core/src/domain/types.rs; then
            echo "::error::Span columns are deferred to v0.2 / scrap-rs#17"
            exit 1
          fi
          echo "scrap-core Span is column-free per v0.1 scope"

  docs:
    name: cargo doc (warnings as errors)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # tracks @stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: scrap-rs
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo doc --workspace --no-deps --document-private-items --locked

  zizmor:
    # Mechanical enforcement of the SHA-pin + workflow-security policy.
    # Runs `zizmor` (https://woodruffw.github.io/zizmor/) over every
    # workflow + composite action. The `unpinned-uses` audit is the
    # primary gate — any new floating-tag `uses:` reference (in a
    # workflow OR a composite action) fails CI here. Other zizmor
    # audits (template-injection, excessive-permissions, artipacked,
    # cache-poisoning, etc.) ride along as additional supply-chain
    # hygiene checks at no marginal cost. Dedicated job
    # (parallelizable, fail-fast) rather than chained into ast-purity
    # / cargo-deny so a supply-chain regression surfaces without
    # waiting on the Rust toolchain. zizmor itself is installed via
    # `pipx run` from the public Python registry — no third-party
    # action wrapper to pin (the wrapper itself would just be another
    # `uses:` reference to keep fresh).
    #
    # See AGENTS.md "Supply-chain hygiene" for the convention this
    # job enforces.
    name: zizmor (workflow security audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run zizmor on .github/
        # `pipx run` fetches a pinned-by-PyPI build into a transient
        # venv; the `>=1.5,<2` constraint locks the audit ruleset to
        # the 1.x major so a zizmor release tightening rules doesn't
        # flip CI red between PRs. Bumping the constraint is a manual
        # edit (no Dependabot ecosystem covers this invocation form);
        # the major-version cap means 2.x lands via human-reviewed PR.
        run: pipx run 'zizmor>=1.5,<2' .github/

  # cargo-public-api (semver-style public API gate) and cargo-mutants
  # (mutation testing) are deliberately deferred. cargo-public-api lands
  # at v1.0 when semver gating begins; cargo-mutants lands with the
  # first detector PR (P13) when mutating real logic earns its keep.
  # Self-check, scorecard-smoke, and crap-self land as detectors come
  # online (sub-issues P24/P25). They require a non-trivial scrap4rs
  # binary to operate against, so they are deferred from the bootstrap.
