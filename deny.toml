# cargo-deny configuration for scrap-rs.
#
# Locks the supply chain at v0.1 with `serde` (runtime) and
# `proptest` + `serde_json` + `insta` (dev-only). Detectors and
# reporters will add transitive deps as they land — this file is the
# guardrail that keeps that addition deliberate.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "Unlicense",
  "Zlib",
  "CC0-1.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow = []
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
