# cargo-deny configuration for scrap-rs.
#
# Locks the supply chain at v0.1 with `serde` (runtime) and
# `proptest` + `serde_json` + `insta` (dev-only). Detectors and
# reporters will add transitive deps as they land â€” this file is the
# guardrail that keeps that addition deliberate.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
# Allowlisted to exactly the licenses encountered in the current dep
# tree. Every additional license decision happens in the PR that
# introduces the dep so the policy moment lands when it matters,
# not as a pre-allowance. This also keeps cargo-deny's signal-to-noise
# clean â€” every "unmatched license allowance" warning becomes a real
# action item, not background noise.
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Unicode-3.0",
]
confidence-threshold = 0.93

[bans]
# `multiple-versions = "warn"` is intentional for v0.x: detector PRs
# (P13â€“P17) will inevitably introduce duplicate-semver versions of
# transitive deps (e.g., `bitflags` from `walkdir` + `clap`), and
# `deny` would block on benign duplicates. Promote to `deny` at v1.0.
multiple-versions = "warn"
wildcards = "deny"
allow = []
deny = []

# AST-library policy.
#
# The hexagonal layering ADR (`ops/decisions/scrap4rs/adr-hexagonal-layout.md`)
# bans AST libraries (`syn`, `swc_*`, `oxc_*`, `tree-sitter*`,
# `proc-macro2`, `quote`) from `scrap-core` so the same library can be
# linked by every adapter binary in the workspace (scrap4rs via syn,
# scrap4ts via swc/oxc, future adapters).
#
# This `deny.toml` does NOT encode the per-crate transitive ban via
# `bans.deny.wrappers`, because:
#
# - `scrap-core` legitimately uses `serde` derive, which pulls `syn`
#   and `proc-macro2` in as proc-macro deps. cargo-deny treats
#   proc-macros as graph nodes; a naive `{ crate = "syn", wrappers =
#   ["scrap4rs"] }` would false-positive on the serde_derive chain.
# - Expanding `wrappers` to allow proc-macro chains (`serde_derive`,
#   `thiserror_impl`, etc.) requires a fragile, ever-growing list â€” a
#   new derive macro entering the workspace silently bypasses the rule
#   until someone updates the wrappers.
#
# Two enforcement mechanisms substitute for transitive cargo-deny:
#
# 1. **Direct-dep enforcement** â€” `crates/scrap-core/Cargo.toml` does
#    not list any AST library. Any addition would require a deliberate
#    Cargo.toml edit, which is visible in PR diff and structurally
#    forbids the corresponding `use` line.
# 2. **Source-level grep** â€” the `ast-purity` CI job in
#    `.github/workflows/ci.yml` rejects any `use syn|use swc|use
#    oxc|use tree_sitter|use proc_macro2|use quote` line inside
#    `crates/scrap-core/src/`. Catches the case where an AST lib is
#    added as a dep AND imported in the same PR.

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
