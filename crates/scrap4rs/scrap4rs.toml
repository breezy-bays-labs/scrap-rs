# scrap4rs.toml — default config.
#
# The CLI looks for this file in the workspace root unless `--config <FILE>`
# is supplied. The full schema lands in v0.1 P22 (see the kickstart epic).
#
# Tracking-issue rule: every entry added to `exclude = [...]` MUST carry an
# inline `# tracked: scrap4rs#<n> — <reason>` comment OR `# adr: <path>` if
# the exclusion is a permanent design decision. See
# ~/.claude/rules/exclusions.md for the full rule and quarterly audit cadence.
#
# Skeleton — values land in P22.

# threshold_mode = "default"          # strict | default | lenient
# src = "."
# exclude = [
#   # tracked: scrap4rs#<n> — <reason>
# ]
#
# [detectors.zero_assertion]
# enabled = true
# penalty = 10
#
# [detectors.tautological_assertion]
# enabled = true
# penalty = 10
#
# [detectors.no_op_io]
# enabled = true
# penalty = 8
#
# [detectors.surface_only_io]
# enabled = true
# penalty = 6
#
# [detectors.large_example]
# enabled = true
# penalty = 4
# line_threshold = 30
#
# [opt_outs]
# attributes = [
#   "allow(scrap::no_asserts)",
#   "allow(scrap::tautology)",
#   "allow(scrap::no_op)",
# ]
#
# [[overrides]]
# pattern = "tests/legacy/**"
# threshold_mode = "lenient"
