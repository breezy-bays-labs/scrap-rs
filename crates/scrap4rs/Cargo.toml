[package]
name = "scrap4rs"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true
description = "Static test smell detector for Rust — finds zero-assertion, tautological, no-op, and surface-only test bodies"
keywords = ["scrap", "testing", "quality", "static-analysis", "smell"]
categories = ["development-tools::testing", "command-line-utilities"]
rust-version.workspace = true

# Binstall metadata is intentionally not wired during v0.x — see ops
# kickstart plan §3 for the no-release-until-v1.0 policy. When v1.0
# lands, mirror crap4rs's [package.metadata.binstall] block.

[lib]
name = "scrap4rs"
path = "src/lib.rs"

[[bin]]
name = "scrap4rs"
path = "src/main.rs"

[dependencies]
# AST parsing (syn), file walking (walkdir/ignore), CLI (clap), and
# rendering crates land in subsequent v0.1 sub-issue PRs. Domain types
# only depend on serde for derive-only (de)serialization — no
# serde-on-AST in domain per hexagonal layering invariant.
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
insta = { version = "1", features = ["json"] }
proptest = "1"
serde_json = "1"
