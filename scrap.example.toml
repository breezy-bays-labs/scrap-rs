# scrap.toml — generated by `scrap4rs init`
# Edit freely; the analyzer re-reads this file on every run.

# Source root the analyzer walks.
src = "crates"

# Threshold mode for the gate verdict. Currently a CLI-only flag
# (`--threshold-mode strict|default|lenient`); the config-file mirror
# lands in a follow-up PR. Uncomment to set when the field arrives.
# threshold_mode = "default"

# Glob patterns matched against project-relative file paths.
# Uncomment to ignore these directories:
# exclude = [
#     "tests/**",
#     "benches/**",
#     "examples/**",
# ]

# File extensions the walker keeps (no leading dot). Defaults to the
# adapter's own list; an empty array means "every file the walker visits".
# extensions = ["rs"]

# Which per-test `#[allow(scrap::*)]` suppressions the project honors.
# Omit the table to honor all; `honor = []` is the strictest policy
# (every opt-out ignored, smells always fire).
# [opt_outs]
# honor = ["no_asserts", "tautology", "no_op"]

# Per-detector tunables. Every detector is enabled by default; the
# values shown ARE the defaults, so uncommenting without editing
# changes nothing. `penalty = 0` is rejected (silently-neutering);
# disable a detector with `enabled = false` instead.
# [detectors.zero_assertion]
# enabled = true
# penalty = 10
#
# [detectors.tautological_assertion]
# enabled = true
# penalty = 10
#
# [detectors.no_op_io]
# enabled = true
# penalty = 8
#
# [detectors.surface_only_io]
# enabled = true
# penalty = 6
#
# [detectors.large_example]
# enabled = true
# penalty = 4
# line_threshold = 30  # only valid on large_example

# Glob-matched overrides — tune or disable detectors for matching
# paths. Among multiple matching blocks the LAST one in document
# order wins per detector key.
# [[overrides]]
# match = ["tests/fixtures/**"]
# [overrides.detectors.large_example]
# line_threshold = 60
