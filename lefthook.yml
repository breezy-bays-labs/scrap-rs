# Pre-commit and pre-push hooks for scrap-rs.
#
# After cloning, run `lefthook install` once to wire git hooks. CI runs
# the same gates plus the coverage threshold; pre-push catches everything
# coverage-independent so most pushes don't burn CI minutes on
# easily-caught local issues.

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all --check
      timeout: 60s
    gitleaks:
      run: gitleaks protect --staged --redact
      timeout: 60s

pre-push:
  parallel: false
  commands:
    # Same battery the `Format`, `Clippy`, `Test (linux-x86)`,
    # `cargo-deny`, and `cargo doc` CI jobs run. Pedantic clippy fires
    # via `#![warn(clippy::pedantic, clippy::cargo)]` at the crate root.
    fmt:
      run: cargo fmt --all --check
      timeout: 60s
    ast-purity:
      # Mirror the `ast-purity` CI job. Rejects AST-library imports in
      # scrap-core; per `deny.toml` AST-library policy comment, this is
      # the source-level backstop for the structural Cargo.toml ban.
      # Regex matches both `use` and `extern crate` forms; trailing
      # `([_:; ]|$)` is a portable word-boundary substitute (GNU + BSD
      # grep). Rejects false positives like `use syntactic_analysis::X`.
      run: |
        set -euo pipefail
        if grep -rE '^[[:space:]]*(use|extern[[:space:]]+crate)[[:space:]]+(::)?(syn|quote|proc_macro2?|tree_sitter|swc|oxc)([_:; ]|$)' crates/scrap-core/src/; then
          echo "scrap-core must not import AST libraries — see decisions/scrap-rs/adr-hexagonal-layout.md"
          exit 1
        fi
      timeout: 30s
    detectors-layer-purity:
      # Mirror the `scrap-core detectors layering purity` CI job
      # (scrap-rs#104). `detectors/` must never import from `cli/` per
      # adr-hexagonal-layout — POD config types live in
      # `crate::domain::config`; `cli::config` only re-exports them.
      # `use`-form anchor keeps doc-comment prose mentioning
      # `crate::cli` from false-positivizing.
      run: |
        set -euo pipefail
        if grep -rEn '^[[:space:]]*use[[:space:]]+(::)?crate::cli(::|;|[[:space:]]|$)' crates/scrap-core/src/detectors/; then
          echo "detectors/ must never import from cli/ — use crate::domain::config (adr-hexagonal-layout, scrap-rs#104)"
          exit 1
        fi
      timeout: 30s
    adapter-name-purity:
      # Mirror the `scrap-core adapter-name literal purity` CI job
      # (scrap-rs#18 → scrap-rs#37). Rejects double-quoted "scrap4rs" /
      # "scrap4ts" string literals anywhere in `crates/scrap-core/`
      # (src/ AND tests/) — adapter names flow through AdapterMeta from
      # the binary crate, never baked into the shared core or its
      # fixtures (which are neutralized to adapter-a/adapter-b/
      # test-adapter). Comment-strip via awk so doc/prose lines that
      # mention the name don't false-positive (scrap-rs#17 lesson).
      # Heuristic, not a parser; portable across GNU + BSD grep/awk.
      run: |
        set -euo pipefail
        matches=$(grep -rnE '"(scrap4rs|scrap4ts)[^"]*"' \
          crates/scrap-core/src crates/scrap-core/tests \
          --include='*.rs' || true)
        unmatched=$(printf '%s\n' "$matches" | awk -F: '
          {
            if (NF < 3) next
            content = ""
            for (i = 3; i <= NF; i++) content = content (i > 3 ? ":" : "") $i
            gsub(/^[ \t]+/, "", content)
            if (content !~ /^(\/\/|\/\*|\*)/) print
          }
        ')
        if [ -n "$unmatched" ]; then
          echo "scrap-core must not reference adapter names (src + tests) — flow through AdapterMeta::tool_name; neutralize fixtures to adapter-a/adapter-b/test-adapter (scrap-rs#37)"
          echo "$unmatched"
          exit 1
        fi
      timeout: 30s
    clippy:
      run: cargo clippy --workspace --all-targets --locked -- -D warnings
      timeout: 300s
    test:
      # Three-step run: nextest covers the lib + standard integration
      # binaries, but skips the cucumber harnesses because cucumber-rs
      # 0.23 (`harness = false`) doesn't implement libtest's `--list
      # --format terse` interface that nextest uses to enumerate
      # tests. Each crate's cucumber binary runs separately via
      # `cargo test -p <crate> --test cucumber`, where
      # tests/cucumber.rs's `main()` owns the runner end-to-end.
      #
      # Per-crate `-p` is REQUIRED: once both scrap-core AND scrap4rs
      # ship a `tests/cucumber.rs`, cargo refuses the ambiguous
      # `--test cucumber` invocation across two crates. (S1.1 of
      # scrap-rs#12: this split lands at the same commit as scrap4rs's
      # cucumber harness.)
      run: |
        cargo nextest run --workspace --all-targets --locked -E 'not binary(cucumber)' && \
          cargo test -p scrap-core --test cucumber --locked && \
          cargo test -p scrap4rs --test cucumber --locked
      timeout: 300s
    deny:
      run: cargo deny check
      timeout: 60s
    docs:
      env:
        RUSTDOCFLAGS: -D warnings
      run: cargo doc --workspace --no-deps --document-private-items --locked
      timeout: 120s
